name: World Cup Alerts

on:
  schedule:
    # Every 5 minutes (times are in UTC). GitHub may delay scheduled runs by a
    # few minutes; the script's time windows tolerate that.
    - cron: "*/5 * * * *"
  workflow_dispatch: # lets you run it manually from the Actions tab

permissions:
  contents: write # needed so the workflow can save the sent.json state

concurrency:
  group: worldcup-alerts
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run alert check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node check.js

      - name: Commit state if changed
        run: |
          if [ -n "$(git status --porcelain sent.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sent.json
            git commit -m "Update sent alerts state"
            git push
          else
            echo "No state change to commit."
          fi
